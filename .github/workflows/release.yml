name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    name: Semantic release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx -y
          -p semantic-release@25.0.3
          -p @semantic-release/changelog@6.0.3
          -p @semantic-release/commit-analyzer@13.0.1
          -p @semantic-release/git@10.0.1
          -p @semantic-release/github@12.0.8
          -p @semantic-release/release-notes-generator@14.1.1
          semantic-release
