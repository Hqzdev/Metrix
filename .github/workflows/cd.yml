name: CD

# ──────────────────────────────────────────────────────────────────────────────
# Deployment gates stay explicit so image publication, production rollout and
# rollback remain auditable from a single workflow.
#
# Triggered only after CI passes on main.
# Workflow:
#   build-push  →  [manual approval]  →  deploy-production
#                                    →  smoke-production
#
# Rollback is a manually dispatched workflow_dispatch job that redeploys the
# previous image tag stored in the GitHub deployment environment.
#
# Required GitHub secrets:
#   SSH_HOST_PRODUCTION   — IP / hostname of production server
#   SSH_USER              — SSH user on the production server
#   SSH_PRIVATE_KEY       — Private key (no passphrase)
#   SSH_KNOWN_HOSTS       — Output of `ssh-keyscan <host>`
#   POSTGRES_PASSWORD     — injected via Docker env on deploy
#   REDIS_PASSWORD        — injected via Docker env on deploy
#   JWT_SECRET            — injected via Docker env on deploy
#   SERVICE_HMAC_SECRET   — injected via Docker env on deploy
#
# Required GitHub variables:
#   DEPLOY_PATH           — absolute path to repo on remote, e.g. /srv/metrix
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Allow manual rollback or re-deploy.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: production
        type: choice
        options: [production]
      image_tag:
        description: 'Image tag to deploy (default: latest sha on main)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hqzdev/metrix

jobs:
  # ── Guard: only proceed when CI workflow succeeded ─────────────────────────
  guard:
    name: Check CI result
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute image tag
        id: tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "tag=sha-${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build and push all service images to GHCR ─────────────────────────────
  build-push:
    name: Build & push ${{ matrix.service }}
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - analytics-service
          - booking-service
          - bot-gateway
          - calendar-service
          - notification-service
          - payment-service
          - security-service
          - worker-service
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/bot
          file: apps/bot/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          # Tag with both the commit SHA (immutable) and the environment tag.
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.guard.outputs.image_tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Check whether SSH deployment is configured ───────────────────────────
  deploy-config:
    name: Check deploy configuration
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      production_ready: ${{ steps.check.outputs.production_ready }}
    steps:
      - name: Check deployment settings
        id: check
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST_PRODUCTION: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          production_ready=true
          for name in DEPLOY_PATH SSH_HOST_PRODUCTION SSH_KNOWN_HOSTS SSH_PRIVATE_KEY SSH_USER; do
            if [[ -z "${!name}" ]]; then
              echo "::notice::${name} is not configured; production SSH deploy will be skipped"
              production_ready=false
            fi
          done

          echo "production_ready=${production_ready}" >> "$GITHUB_OUTPUT"

  # ── Manual approval gate before production ───────────────────────────────
  # GitHub Environments with required reviewers provides the approval UI.
  # Set up: Settings → Environments → production → Required reviewers.

  # ── Deploy to production ──────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    needs: [guard, build-push, deploy-config]
    runs-on: ubuntu-latest
    if: ${{ needs.deploy-config.outputs.production_ready == 'true' }}
    environment:
      name: production
      url: https://metrixplatform.com
    steps:
      - uses: actions/checkout@v4

      - name: Validate production deploy settings
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          missing=0
          for name in DEPLOY_PATH SSH_HOST SSH_KNOWN_HOSTS SSH_PRIVATE_KEY SSH_USER; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} is not configured for production deployment"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write SSH key
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          IMAGE_TAG: ${{ needs.guard.outputs.image_tag }}
          SSH_HOST: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh_target="${SSH_USER}@${SSH_HOST}"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              "$ssh_target" \
              "DEPLOY_PATH=${DEPLOY_PATH@Q} IMAGE_PREFIX=${IMAGE_PREFIX@Q} IMAGE_TAG=${IMAGE_TAG@Q} bash -s" << 'ENDSSH'
            set -euo pipefail
            cd "$DEPLOY_PATH/apps/bot"

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            TAG="${IMAGE_TAG}"

            # Save previous tag before overwriting — used by rollback.
            [[ -f .last-deployed-tag ]] && cp .last-deployed-tag .previous-deployed-tag

            for svc in admin-service analytics-service booking-service bot-gateway \
                       calendar-service notification-service payment-service \
                       security-service worker-service; do
              docker pull "${IMAGE_PREFIX}/${svc}:${TAG}"
            done

            echo "${TAG}" > .last-deployed-tag

            export IMAGE_TAG="${TAG}"
            docker compose up -d --no-build \
              admin-service analytics-service booking-service bot-gateway \
              calendar-service notification-service payment-service \
              security-service worker-service

            deadline=$(($(date +%s) + 120))
            while [[ $(date +%s) -lt $deadline ]]; do
              unhealthy=$(docker compose ps --format json \
                | jq -r 'select(.Health != "healthy" and .Health != "") | .Name')
              [[ -z "$unhealthy" ]] && echo "All services healthy" && break
              echo "Waiting for: $unhealthy"
              sleep 5
            done
          ENDSSH

  # ── Smoke test production ─────────────────────────────────────────────────
  smoke-production:
    name: Smoke test production
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run smoke tests against production
        env:
          BOOKING_SERVICE_URL: https://metrixplatform.com/booking
          INTEGRATION_TEST: 'true'
        run: npm run test:integration -- --test-name-pattern="smoke"

  # ── Auto-rollback if production smoke tests fail ──────────────────────────
  rollback-production:
    name: Rollback production
    needs: smoke-production
    runs-on: ubuntu-latest
    if: ${{ needs.smoke-production.result == 'failure' }}
    environment:
      name: production
    steps:
      - name: Validate rollback settings
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          missing=0
          for name in DEPLOY_PATH SSH_HOST SSH_KNOWN_HOSTS SSH_PRIVATE_KEY SSH_USER; do
            if [[ -z "${!name}" ]]; then
              echo "::error::${name} is not configured for production rollback"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write SSH key
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Rollback to previous image tag
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST_PRODUCTION }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh_target="${SSH_USER}@${SSH_HOST}"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              "$ssh_target" \
              "DEPLOY_PATH=${DEPLOY_PATH@Q} bash -s" << 'ENDSSH'
            set -euo pipefail
            cd "$DEPLOY_PATH/apps/bot"

            if [[ ! -f .previous-deployed-tag ]]; then
              echo "No previous tag file found — cannot auto-rollback" >&2
              exit 1
            fi

            PREV_TAG=$(cat .previous-deployed-tag)
            echo "Rolling back to ${PREV_TAG}"

            export IMAGE_TAG="${PREV_TAG}"
            docker compose up -d --no-build \
              admin-service analytics-service booking-service bot-gateway \
              calendar-service notification-service payment-service \
              security-service worker-service

            echo "Rollback complete. Previous tag: ${PREV_TAG}"
          ENDSSH
