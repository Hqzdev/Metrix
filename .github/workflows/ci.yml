name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: API and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Typecheck API package
        run: npm run typecheck:api

      - name: Run tests
        run: npm test

      - name: Validate OpenAPI spec
        run: npm run openapi:validate

  bot:
    name: Bot microservices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/bot/package-lock.json

      - name: Install bot dependencies
        run: npm --prefix apps/bot install

      - name: Build bot workspaces
        run: npm --prefix apps/bot run build

  web:
    name: Web typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Typecheck web
        run: npm --prefix apps/web run typecheck

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - analytics-service
          - booking-service
          - bot-gateway
          - calendar-service
          - notification-service
          - payment-service
          - worker-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build service image
        run: docker build apps/bot --file apps/bot/Dockerfile.service --build-arg SERVICE_NAME=${{ matrix.service }}

  # ── Contract tests ────────────────────────────────────────────────────────
  # Spins up the three stateful services against a real Postgres + Redis,
  # then runs the schema-validation tests in tests/contracts/.
  # This catches breaking contract changes before they reach staging.
  contract:
    name: Contract tests
    runs-on: ubuntu-latest
    needs: [api, bot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Create .env for docker compose
        working-directory: apps/bot
        run: |
          cat > .env << 'EOF'
          POSTGRES_PASSWORD=ci_pg_password
          REDIS_PASSWORD=ci_redis_password
          GATEWAY_SIGNING_SECRET=ci_gateway_secret_32chars_padding
          GATEWAY_SIGNING_SECRET_NEXT=
          PAYMENT_SIGNING_SECRET=ci_payment_secret_32chars_padding
          PAYMENT_SIGNING_SECRET_NEXT=
          ANALYTICS_SIGNING_SECRET=ci_analytics_secret_32chars_pad
          ANALYTICS_SIGNING_SECRET_NEXT=
          ADMIN_SIGNING_SECRET=ci_admin_secret_32chars_padding_x
          ADMIN_SIGNING_SECRET_NEXT=
          SECURITY_SIGNING_SECRET=ci_security_secret_32chars_paddi
          USER_ID_SIGNING_SECRET=ci_userid_secret_32chars_padding
          CALENDAR_TOKEN_SECRET=ci_calendar_token_secret_32chars
          JWT_SECRET=ci_jwt_secret_32chars_padding_xx
          JWT_KEY_ID=ci-key-1
          JWT_PREVIOUS_KEYS=
          TELEGRAM_BOT_TOKEN=0:ci_placeholder_token
          TELEGRAM_PAYMENT_PROVIDER_TOKEN=
          YOOKASSA_PROVIDER_TOKEN=
          PAYMENT_CURRENCY=RUB
          GOOGLE_CALENDAR_CLIENT_ID=
          GOOGLE_CALENDAR_CLIENT_SECRET=
          GOOGLE_CALENDAR_REDIRECT_URI=http://localhost:3002/oauth/callback
          TELEGRAM_MODE=polling
          TELEGRAM_WEBHOOK_URL=
          TELEGRAM_WEBHOOK_SECRET=
          ADMIN_TELEGRAM_IDS=0
          MINIO_ACCESS_KEY=ci_minio_access
          MINIO_SECRET_KEY=ci_minio_secret
          GLITCHTIP_SECRET_KEY=ci_glitchtip_secret_key_32chars_p
          GLITCHTIP_DOMAIN=http://errors.localhost
          GRAFANA_ADMIN_PASSWORD=ci_grafana_password
          BOT_DOMAIN=bot.localhost
          AUDIT_RETENTION_DAYS=180
          AUDIT_RETENTION_INTERVAL_MS=86400000
          EOF

      - name: Start services under test
        working-directory: apps/bot
        run: |
          docker compose up -d \
            postgres redis pgbouncer db-init \
            booking-service payment-service calendar-service
          # Wait up to 90s for booking-service to become healthy.
          timeout 90 sh -c 'until docker compose ps booking-service | grep -q "healthy"; do sleep 3; done'

      - name: Run contract tests
        env:
          CONTRACT_TEST: 'true'
          BOOKING_SERVICE_URL: http://localhost:3001
          PAYMENT_SERVICE_URL: http://localhost:3003
          CALENDAR_SERVICE_URL: http://localhost:3002
        run: |
          node --import tsx \
            --test \
            tests/contracts/booking-service.contract.test.ts \
            tests/contracts/payment-service.contract.test.ts \
            tests/contracts/calendar-service.contract.test.ts

      - name: Dump service logs on failure
        if: failure()
        working-directory: apps/bot
        run: docker compose logs booking-service payment-service calendar-service

      - name: Tear down
        if: always()
        working-directory: apps/bot
        run: docker compose down -v

  security:
    name: Dependency scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Install bot dependencies
        run: npm --prefix apps/bot install

      - name: Audit bot dependencies
        run: npm --prefix apps/bot audit --audit-level=high

      - name: Install web dependencies
        run: npm --prefix apps/web install

      - name: Audit web dependencies
        run: npm --prefix apps/web audit --audit-level=high
