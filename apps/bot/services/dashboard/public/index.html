<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metrix Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 1.4rem; margin-bottom: 20px; color: #fff; }
    h2 { font-size: 1rem; margin: 24px 0 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
    } 
    .card .name { font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    .card .status { font-size: 1rem; font-weight: bold; }
    .card .detail { font-size: 0.75rem; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .uptime { font-size: 0.75rem; color: #777; margin-top: 6px; }
    .ok { color: #4ade80; }
    .error { color: #f87171; }
    .unknown { color: #facc15; }

    /* ── Метрики ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .metric-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .metric-card .svc-name { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
    .metric-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.78rem;
    }
    .metric-label { color: #666; width: 70px; flex-shrink: 0; }
    .metric-value { color: #e0e0e0; width: 64px; text-align: right; flex-shrink: 0; }
    /* Полоска визуализирует значение относительно условного максимума. */
    .metric-bar-track {
      flex: 1;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }
    .metric-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .bar-rps    { background: #60a5fa; }
    .bar-lat    { background: #a78bfa; }
    .bar-err-ok { background: #4ade80; }
    .bar-err-hi { background: #f87171; }
    .metric-empty { font-size: 0.75rem; color: #444; font-style: italic; }

    /* ── Логи ── */
    .log-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tab {
      padding: 4px 12px;
      border-radius: 4px;
      background: #1a1a1a;
      border: 1px solid #333;
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
    }
    .tab.active { background: #2a2a2a; border-color: #555; color: #fff; }
    .log-box {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      height: 380px;
      overflow-y: auto;
      padding: 12px;
      font-size: 0.78rem;
      line-height: 1.5;
    }
    .log-line { white-space: pre-wrap; word-break: break-word; }
    .log-line.err { color: #f87171; }
    .log-line.warn { color: #facc15; }
    .ts { color: #555; margin-right: 6px; }
    .refresh-note { font-size: 0.75rem; color: #444; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Metrix — Service Dashboard</h1>

  <h2>Health Status</h2>
  <div class="grid" id="grid">Loading...</div>
  <p class="refresh-note" id="lastCheck"></p>

  <h2>Метрики (последняя минута)</h2>
  <div class="metrics-grid" id="metricsGrid">Loading...</div>
  <p class="refresh-note" id="metricsNote"></p>

  <h2>Logs</h2>
  <div class="log-tabs" id="tabs"></div>
  <div class="log-box" id="logBox"></div>

  <script>
    // Список сервисов должен совпадать с backend SERVICES в index.js.
    const SERVICES = [
      'postgres',
      'redis',
      'bot-gateway',
      'booking-service',
      'calendar-service',
      'payment-service',
      'analytics-service',
      'admin-service',
      'security-service',
      'notification-service',
      'worker-service',
      'traefik',
      'minio',
      'prometheus',
      'grafana',
      'glitchtip',
    ];

    // Сервисы, у которых есть HTTP /metrics — только они появятся в метриках.
    const METRIC_SERVICES = [
      'bot-gateway',
      'booking-service',
      'calendar-service',
      'payment-service',
      'analytics-service',
      'admin-service',
      'security-service',
    ];

    // Условные максимумы для визуальных полосок.
    // Полоска = min(value / MAX, 1) * 100%.
    const MAX_RPS = 50;        // req/s — выше этого полоска заполнена на 100%
    const MAX_LATENCY_MS = 2000; // мс
    const MAX_ERROR_PCT = 5;   // % — выше этого полоска красная и полная

    // Текущая вкладка логов.
    let currentService = SERVICES[0];
    // EventSource текущего SSE-потока логов.
    let currentEs = null;

    /**
     * Загружает health всех сервисов и обновляет отметку последней проверки.
     */
    async function fetchHealth() {
      try {
        // Backend сам ходит в Docker и /ready endpoint-ы.
        const data = await requestJson('/api/health');
        renderHealth(data);
        document.getElementById('lastCheck').textContent =
          'Обновлено: ' + new Date().toLocaleTimeString('ru');
      } catch {
        document.getElementById('grid').textContent = 'Ошибка соединения с dashboard сервером';
      }
    }

    /**
     * Загружает метрики из Prometheus через backend.
     */
    async function fetchMetrics() {
      try {
        const data = await requestJson('/api/metrics');
        renderMetrics(data);
        document.getElementById('metricsNote').textContent =
          'Обновлено: ' + new Date().toLocaleTimeString('ru');
      } catch {
        document.getElementById('metricsGrid').textContent = 'Prometheus недоступен';
      }
    }

    /**
     * Рисует карточки состояния сервисов.
     */
    function renderHealth(services) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      services.forEach((svc) => {
        const card = document.createElement('div');
        card.className = 'card';
        const cls = svc.status === 'ok' ? 'ok' : svc.status === 'unknown' ? 'unknown' : 'error';
        const icon = svc.status === 'ok' ? '● online' : svc.status === 'unknown' ? '◌ unknown' : '● offline';
        const detail = typeof svc.detail === 'object' ? JSON.stringify(svc.detail) : String(svc.detail || '');

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = svc.name;

        const status = document.createElement('div');
        status.className = `status ${cls}`;
        status.textContent = icon;

        const detailEl = document.createElement('div');
        detailEl.className = 'detail';
        detailEl.title = detail;
        detailEl.textContent = detail;

        const uptime = document.createElement('div');
        uptime.className = 'uptime';
        uptime.textContent = `uptime: ${formatUptime(svc.uptimeSeconds)}`;

        card.append(name, status, detailEl, uptime);
        grid.appendChild(card);
      });
    }

    /**
     * Рисует карточки с метриками для сервисов у которых есть данные от Prometheus.
     */
    function renderMetrics(data) {
      const grid = document.getElementById('metricsGrid');
      grid.innerHTML = '';

      // Показываем только сервисы с HTTP метриками, в фиксированном порядке.
      for (const svcName of METRIC_SERVICES) {
        const m = data[svcName];
        const card = document.createElement('div');
        card.className = 'metric-card';

        if (!m) {
          // Данных нет — Prometheus ещё не собрал или сервис не запущен.
          const name = document.createElement('div');
          name.className = 'svc-name';
          name.textContent = svcName;

          const empty = document.createElement('div');
          empty.className = 'metric-empty';
          empty.textContent = 'нет данных от Prometheus';

          card.append(name, empty);
        } else {
          const rps = m.rps ?? 0;
          const lat = m.latencyP95Ms ?? 0;
          const err = m.errorRatePct ?? 0;

          // Ширина полоски — процент от условного максимума, не превышает 100%.
          const rpsWidth  = Math.min(rps / MAX_RPS * 100, 100).toFixed(1);
          const latWidth  = Math.min(lat / MAX_LATENCY_MS * 100, 100).toFixed(1);
          const errWidth  = Math.min(err / MAX_ERROR_PCT * 100, 100).toFixed(1);
          // Полоска error rate меняет цвет: зелёная если < 1%, красная если выше.
          const errBarCls = err >= 1 ? 'bar-err-hi' : 'bar-err-ok';

          const name = document.createElement('div');
          name.className = 'svc-name';
          name.textContent = svcName;

          card.append(
            name,
            createMetricRow('RPS', rps.toFixed(2), 'bar-rps', rpsWidth),
            createMetricRow('p95 latency', `${lat.toFixed(0)} мс`, 'bar-lat', latWidth),
            createMetricRow('error rate', `${err.toFixed(2)}%`, errBarCls, errWidth),
          );
        }

        grid.appendChild(card);
      }
    }

    /**
     * Рисует вкладки логов для всех сервисов.
     */
    function renderTabs() {
      const container = document.getElementById('tabs');
      SERVICES.forEach((name) => {
        const btn = document.createElement('div');
        btn.className = 'tab' + (name === currentService ? ' active' : '');
        btn.textContent = name;
        btn.onclick = () => switchService(name);
        container.appendChild(btn);
      });
    }

    /**
     * Переключает выбранный сервис логов.
     */
    function switchService(name) {
      currentService = name;
      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.toggle('active', tab.textContent === name);
      });
      startLogStream(name);
    }

    /**
     * Открывает SSE-поток логов выбранного сервиса.
     */
    function startLogStream(service) {
      if (currentEs) currentEs.close();
      const box = document.getElementById('logBox');
      box.innerHTML = '';

      currentEs = new EventSource(`/api/logs/${encodeURIComponent(service)}`);
      currentEs.onmessage = (event) => {
        const raw = JSON.parse(event.data);
        const line = document.createElement('div');
        line.className = 'log-line';

        if (/error|Error|ERROR/.test(raw)) line.classList.add('err');
        else if (/warn|WARN/.test(raw)) line.classList.add('warn');

        const match = raw.match(/^(\S+T\S+Z)\s(.*)$/s);
        if (match) {
          const ts = document.createElement('span');
          ts.className = 'ts';
          ts.textContent = new Date(match[1]).toLocaleTimeString('ru');
          line.appendChild(ts);
          line.appendChild(document.createTextNode(match[2]));
        } else {
          line.textContent = raw;
        }

        box.appendChild(line);
        box.scrollTop = box.scrollHeight;
      };
      currentEs.onerror = () => {
        const line = document.createElement('div');
        line.className = 'log-line err';
        line.textContent = '[поток логов прерван или сервис недоступен]';
        box.appendChild(line);
      };
    }

    /**
     * Превращает seconds uptime в короткую строку.
     */
    function formatUptime(seconds) {
      if (seconds === null || seconds === undefined) return 'n/a';
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      if (days > 0) return `${days}d ${hours}h`;
      if (hours > 0) return `${hours}h ${minutes}m`;
      return `${minutes}m`;
    }

    /**
     * Загружает JSON и превращает неуспешный HTTP status в ошибку для UI fallback.
     */
    async function requestJson(url) {
      const response = await fetch(url);
      const body = await response.json();
      if (!response.ok) {
        throw new Error(body.error || `HTTP ${response.status}`);
      }

      return body;
    }

    /**
     * Создаёт строку метрики с подписью, значением и визуальной полоской.
     */
    function createMetricRow(labelText, valueText, barClassName, widthPercent) {
      const row = document.createElement('div');
      row.className = 'metric-row';

      const label = document.createElement('span');
      label.className = 'metric-label';
      label.textContent = labelText;

      const value = document.createElement('span');
      value.className = 'metric-value';
      value.textContent = valueText;

      const track = document.createElement('div');
      track.className = 'metric-bar-track';

      const fill = document.createElement('div');
      fill.className = `metric-bar-fill ${barClassName}`;
      fill.style.width = `${widthPercent}%`;

      track.appendChild(fill);
      row.append(label, value, track);
      return row;
    }

    // Первичная отрисовка страницы.
    renderTabs();
    fetchHealth();
    fetchMetrics();
    // Health обновляем каждые 10 секунд, метрики каждые 15 секунд.
    setInterval(fetchHealth, 10_000);
    setInterval(fetchMetrics, 15_000);
    // Логи открываем сразу для первого сервиса.
    startLogStream(currentService);
  </script>
</body>
</html>
