# ─── local compose env ────────────────────────────────────────────────────────
# apps/bot/.env.example is only a local docker-compose convenience file.
# Production must inject env per service through Docker/Kubernetes/Vault/etc.
# Each service also has services/<name>/.env.example with its own least-privilege
# contract. Do not give a service secrets it does not use.

services:

  # ── Инфраструктура ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metrix
      POSTGRES_USER: metrix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # no host port — only accessible within docker network
    expose:
      - '5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U metrix']
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: metrix
      DB_USER: metrix
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '200'
      DEFAULT_POOL_SIZE: '20'
    expose:
      - '5432'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG ""
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: booking-service
    command: >
      sh -c "npx prisma db push --accept-data-loss --schema=/app/prisma/schema.prisma &&
      npx prisma db execute --schema=/app/prisma/schema.prisma --file=/app/prisma/post-init.sql &&
      npx prisma db execute --schema=/app/prisma/schema.prisma --file=/app/prisma/migrations/20260519_production_hardening.sql"
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@postgres:5432/metrix
    depends_on:
      postgres:
        condition: service_healthy

  # ── Бизнес-сервисы ────────────────────────────────────────────────────────────

  booking-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: booking-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3001'
      # OpenTelemetry — traces sent to Jaeger OTLP HTTP endpoint.
      # Remove or set to '' to disable tracing without changing code.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_TRACES_SAMPLER_ARG: '1.0'
      SERVICE_VERSION: '0.1.0'
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
      TRUSTED_PAYMENT_SECRET: ${PAYMENT_SIGNING_SECRET}
      TRUSTED_PAYMENT_SECRET_NEXT: ${PAYMENT_SIGNING_SECRET_NEXT:-}
      TRUSTED_ANALYTICS_SECRET: ${ANALYTICS_SIGNING_SECRET}
      TRUSTED_ANALYTICS_SECRET_NEXT: ${ANALYTICS_SIGNING_SECRET_NEXT:-}
      TRUSTED_ADMIN_SECRET: ${ADMIN_SIGNING_SECRET}
      TRUSTED_ADMIN_SECRET_NEXT: ${ADMIN_SIGNING_SECRET_NEXT:-}
      USER_ID_SIGNING_SECRET: ${USER_ID_SIGNING_SECRET}
    expose:
      - '3001'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3001/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  calendar-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: calendar-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3002'
      GOOGLE_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI}
      CALENDAR_TOKEN_SECRET: ${CALENDAR_TOKEN_SECRET}
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
      USER_ID_SIGNING_SECRET: ${USER_ID_SIGNING_SECRET}
    expose:
      - '3002'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3002/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: payment-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3003'
      TELEGRAM_PAYMENT_PROVIDER_TOKEN: ${TELEGRAM_PAYMENT_PROVIDER_TOKEN:-}
      YOOKASSA_PROVIDER_TOKEN: ${YOOKASSA_PROVIDER_TOKEN:-}
      PAYMENT_CURRENCY: ${PAYMENT_CURRENCY:-RUB}
      BOOKING_SERVICE_URL: http://booking-service:3001
      PAYMENT_SIGNING_SECRET: ${PAYMENT_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
      TRUSTED_ADMIN_SECRET: ${ADMIN_SIGNING_SECRET}
      TRUSTED_ADMIN_SECRET_NEXT: ${ADMIN_SIGNING_SECRET_NEXT:-}
      USER_ID_SIGNING_SECRET: ${USER_ID_SIGNING_SECRET}
    expose:
      - '3003'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3003/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      booking-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: notification-service
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      redis:
        condition: service_healthy

  worker-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: worker-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CALENDAR_SERVICE_URL: http://calendar-service:3002
      CALENDAR_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
      # REPORTS_DIR используется как временная папка до загрузки в MinIO.
      REPORTS_DIR: /app/reports
      # MinIO — основное хранилище готовых отчётов.
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: 'false'
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: analytics-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3005'
      BOOKING_SERVICE_URL: http://booking-service:3001
      ANALYTICS_SIGNING_SECRET: ${ANALYTICS_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
      TRUSTED_ADMIN_SECRET: ${ADMIN_SIGNING_SECRET}
      TRUSTED_ADMIN_SECRET_NEXT: ${ADMIN_SIGNING_SECRET_NEXT:-}
    expose:
      - '3005'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3005/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  security-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: security-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3008'
      SECURITY_SIGNING_SECRET: ${SECURITY_SIGNING_SECRET}
      JWT_KEY_ID: ${JWT_KEY_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PREVIOUS_KEYS: ${JWT_PREVIOUS_KEYS:-}
      # сервисы, которым разрешено обращаться к security-service
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
      TRUSTED_ADMIN_SECRET: ${ADMIN_SIGNING_SECRET}
      TRUSTED_ADMIN_SECRET_NEXT: ${ADMIN_SIGNING_SECRET_NEXT:-}
    expose:
      - '3008'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3008/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: admin-service
    environment:
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@pgbouncer:5432/metrix?pgbouncer=true
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: '3006'
      BOOKING_SERVICE_URL: http://booking-service:3001
      PAYMENT_SERVICE_URL: http://payment-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3005
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-180}
      AUDIT_RETENTION_INTERVAL_MS: ${AUDIT_RETENTION_INTERVAL_MS:-86400000}
      ADMIN_SIGNING_SECRET: ${ADMIN_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET: ${GATEWAY_SIGNING_SECRET}
      TRUSTED_GATEWAY_SECRET_NEXT: ${GATEWAY_SIGNING_SECRET_NEXT:-}
    expose:
      - '3006'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3006/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      payment-service:
        condition: service_started
      security-service:
        condition: service_started

  bot-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: bot-gateway
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      HEALTH_PORT: '3000'
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      BOOKING_SERVICE_URL: http://booking-service:3001
      CALENDAR_SERVICE_URL: http://calendar-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3005
      ADMIN_SERVICE_URL: http://admin-service:3006
      SECURITY_SERVICE_URL: http://security-service:3008
      GATEWAY_SIGNING_SECRET: ${GATEWAY_SIGNING_SECRET}
      USER_ID_SIGNING_SECRET: ${USER_ID_SIGNING_SECRET}
      TELEGRAM_MODE: ${TELEGRAM_MODE:-polling}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    # Traefik проксирует внешний трафик — прямой port mapping убран.
    expose:
      - '3000'
    labels:
      - 'traefik.enable=true'
      # Webhook endpoint Telegram. В production Host должен совпадать с TELEGRAM_WEBHOOK_URL.
      - 'traefik.http.routers.bot-gateway.rule=Host(`bot.localhost`) || Host(`${BOT_DOMAIN:-bot.localhost}`)'
      - 'traefik.http.routers.bot-gateway.entrypoints=web'
      - 'traefik.http.services.bot-gateway.loadbalancer.server.port=3000'
      # Rate limiting защищает от flood атак на webhook endpoint.
      - 'traefik.http.routers.bot-gateway.middlewares=webhook-rate-limit@file,secure-headers@file'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy
      booking-service:
        condition: service_started
      calendar-service:
        condition: service_started
      payment-service:
        condition: service_started
      analytics-service:
        condition: service_started
      admin-service:
        condition: service_started
      security-service:
        condition: service_started
      # Traefik должен быть готов до gateway — он принимает внешний трафик на webhook.
      traefik:
        condition: service_healthy

  dashboard:
    build:
      context: ./services/dashboard
    environment:
      # Prometheus внутри docker-сети — dashboard обращается к нему напрямую для /api/metrics.
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - '9090'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.dashboard.rule=Host(`dashboard.localhost`)'
      - 'traefik.http.routers.dashboard.entrypoints=web'
      - 'traefik.http.services.dashboard.loadbalancer.server.port=9090'
      - 'traefik.http.routers.dashboard.middlewares=admin-rate-limit@file,secure-headers@file'
    depends_on:
      - bot-gateway
      # Prometheus должен быть запущен, чтобы /api/metrics работал сразу при открытии.
      - prometheus
    restart: unless-stopped

  # ── Error tracking ────────────────────────────────────────────────────────────

  glitchtip:
    # GlitchTip — лёгкий self-hosted аналог Sentry, совместимый с его SDK.
    # Принимает события через стандартный Sentry DSN протокол.
    image: glitchtip/glitchtip:v4
    environment:
      # GlitchTip использует ту же PostgreSQL, что и остальные сервисы.
      # Отдельная база изолирует данные трекера от бизнес-данных.
      DATABASE_URL: postgresql://metrix:${POSTGRES_PASSWORD}@postgres:5432/metrix_glitchtip
      # Redis нужен для очередей обработки событий.
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      # SECRET_KEY должен быть длинным случайным строком — иначе сессии небезопасны.
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: '8080'
      # consolemail выводит письма в stdout вместо отправки — удобно для локальной разработки.
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      # GLITCHTIP_DOMAIN нужен для формирования ссылок в алертах.
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://errors.localhost}
    expose:
      - '8080'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.glitchtip.rule=Host(`errors.localhost`)'
      - 'traefik.http.routers.glitchtip.entrypoints=web'
      - 'traefik.http.services.glitchtip.loadbalancer.server.port=8080'
      - 'traefik.http.routers.glitchtip.middlewares=admin-rate-limit@file,secure-headers@file'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/_health/']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Логирование ───────────────────────────────────────────────────────────────

  loki:
    # Loki — агрегатор логов от Grafana. Хранит и индексирует логи по labels.
    # Запросы пишутся на LogQL: {service="booking-service"} |= "error"
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ../../monitoring/logging/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    expose:
      - '3100'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3100/ready']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vector:
    # Vector — лёгкий log shipper. Читает docker logs, парсит JSON, отправляет в Loki.
    image: timberio/vector:0.42.0-alpine
    volumes:
      # Конфиг pipeline: docker → parse_json → add_service_meta → loki + stdout.
      - ../../monitoring/logging/vector.toml:/etc/vector/vector.toml:ro
      # Docker socket нужен Vector чтобы читать логи контейнеров.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Мониторинг ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    # Явная команда нужна, чтобы задать retention и путь к конфигу.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Хранить метрики 15 дней; для production можно поднять до 30d.
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.path=/prometheus'
      # Web enable-lifecycle позволяет перезагружать конфиг через HTTP /-/reload.
      - '--web.enable-lifecycle'
    volumes:
      # Конфиг scrape_configs монтируем из репозитория, чтобы версионировать его вместе с кодом.
      - ../../monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    # Prometheus не нужен снаружи — Grafana обращается к нему напрямую через docker-сеть.
    expose:
      - '9090'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/ready']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Пароль администратора обязательно задавать в .env — дефолт небезопасен.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      # Отключаем телеметрию Grafana в сторону Grafana Labs.
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      # Запрещаем анонимный доступ — дашборды содержат внутренние метрики.
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      # Отключаем встроенный alert manager — у нас нет email-сервера.
      GF_ALERTING_ENABLED: 'false'
      GF_UNIFIED_ALERTING_ENABLED: 'false'
      # GF_SERVER_ROOT_URL нужен, чтобы ссылки в Grafana вели на правильный домен через Traefik.
      GF_SERVER_ROOT_URL: http://grafana.localhost
    volumes:
      # Provisioning: Grafana сама подключит Prometheus и загрузит дашборды при старте.
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - '3000'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.grafana.rule=Host(`grafana.localhost`)'
      - 'traefik.http.routers.grafana.entrypoints=web'
      - 'traefik.http.services.grafana.loadbalancer.server.port=3000'
      - 'traefik.http.routers.grafana.middlewares=admin-rate-limit@file,secure-headers@file'
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Object storage ────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    # server — основная команда. console-address задаёт порт Web UI.
    command: server /data --console-address ':9001'
    environment:
      # Credentials для S3-совместимого API.
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      # MINIO_BROWSER_REDIRECT_URL нужен, чтобы MinIO Console корректно строил ссылки через Traefik.
      MINIO_BROWSER_REDIRECT_URL: http://minio.localhost
    volumes:
      # Данные объектного хранилища лежат на именованном volume — не теряются при пересоздании.
      - minio_data:/data
    expose:
      - '9000'
      - '9001'
    labels:
      - 'traefik.enable=true'
      # S3 API используется сервисами внутри docker-сети напрямую.
      # Маршрут нужен для presigned URL-ов, которые клиент открывает в браузере.
      - 'traefik.http.routers.minio-api.rule=Host(`minio-api.localhost`)'
      - 'traefik.http.routers.minio-api.entrypoints=web'
      - 'traefik.http.routers.minio-api.service=minio-api'
      - 'traefik.http.services.minio-api.loadbalancer.server.port=9000'
      # MinIO Console — веб-интерфейс для управления бакетами и объектами.
      - 'traefik.http.routers.minio-console.rule=Host(`minio.localhost`)'
      - 'traefik.http.routers.minio-console.entrypoints=web'
      - 'traefik.http.routers.minio-console.service=minio-console'
      - 'traefik.http.services.minio-console.loadbalancer.server.port=9001'
      - 'traefik.http.routers.minio-console.middlewares=admin-rate-limit@file'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Distributed tracing ──────────────────────────────────────────────────────

  jaeger:
    # Jaeger all-in-one: collector + query UI in a single container.
    # Accepts OTLP (HTTP :4318, gRPC :4317) and Jaeger native protocols.
    # UI is available at http://tracing.localhost via Traefik.
    image: jaegertracing/all-in-one:1.60
    environment:
      # Use in-memory storage for local dev (no persistence across restarts).
      # For production switch to SPAN_STORAGE_TYPE=elasticsearch or opensearch.
      SPAN_STORAGE_TYPE: memory
      # Keep last 100 000 spans in memory — enough for local development.
      MEMORY_MAX_TRACES: '100000'
      # Disable sampling server; services control their own sample rate.
      SAMPLING_STRATEGIES_FILE: ''
    expose:
      # OTLP HTTP — services send traces to this port.
      - '4318'
      # OTLP gRPC — alternative transport.
      - '4317'
      # Jaeger query UI.
      - '16686'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.jaeger.rule=Host(`tracing.localhost`)'
      - 'traefik.http.routers.jaeger.entrypoints=web'
      - 'traefik.http.services.jaeger.loadbalancer.server.port=16686'
      - 'traefik.http.routers.jaeger.middlewares=admin-rate-limit@file,secure-headers@file'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:14269/']
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Reverse proxy ─────────────────────────────────────────────────────────────

  traefik:
    image: traefik:v3.1
    # Конфиг читается из смонтированного файла, чтобы не дублировать флаги в command.
    command:
      - '--configFile=/etc/traefik/traefik.yml'
    ports:
      # Единственная публичная точка входа для HTTP-трафика.
      - '80:80'
      # Traefik Dashboard доступен напрямую на 8080 — Traefik не проксирует сам себя.
      - '8080:8080'
    volumes:
      # Docker socket нужен Traefik, чтобы читать labels контейнеров.
      # :ro — read-only, Traefik не должен управлять контейнерами.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Статическая конфигурация (entrypoints, провайдеры).
      - ../../traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      # Динамическая конфигурация (middleware, TLS rules).
      - ../../traefik/dynamic:/etc/traefik/dynamic:ro
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  # Prometheus хранит TSDB на именованном volume, чтобы данные не терялись при пересоздании контейнера.
  prometheus_data:
  # Grafana хранит плагины и пользовательские настройки на volume.
  grafana_data:
  # MinIO хранит объекты (отчёты, будущие файлы) на именованном volume.
  minio_data:
  # Loki хранит chunks и индекс логов на именованном volume.
  loki_data:
