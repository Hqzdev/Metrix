<svg width="1024" height="1024" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: indigo rounded square (22% corner radius = iOS-style) -->
  <rect width="100" height="100" rx="22" fill="#4F46E5"/>

  <!-- Booked room fill — top-right room, inset by half stroke-width -->
  <rect x="59.5" y="22.5" width="21" height="26" fill="white"/>

  <!-- Floor plan: outer wall + room dividers -->
  <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer building wall -->
    <rect x="18" y="21" width="64" height="58" rx="2"/>
    <!-- Vertical divider: left open space / right private rooms -->
    <line x1="58" y1="21" x2="58" y2="79"/>
    <!-- Horizontal divider: top booked room / bottom available room -->
    <line x1="58" y1="50" x2="82" y2="50"/>
  </g>
</svg>
