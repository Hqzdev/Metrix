<svg width="1024" height="1024" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: indigo rounded square -->
  <rect width="100" height="100" rx="22" fill="#4F46E5"/>

  <!-- 2x2 booking grid -->
  <!-- Top-left: booked (filled white) -->
  <rect x="26" y="26" width="22" height="22" rx="4" fill="white"/>
  <!-- Top-right: available -->
  <rect x="52" y="26" width="22" height="22" rx="4" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.45"/>
  <!-- Bottom-left: available -->
  <rect x="26" y="52" width="22" height="22" rx="4" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.45"/>
  <!-- Bottom-right: available -->
  <rect x="52" y="52" width="22" height="22" rx="4" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.45"/>
</svg>
