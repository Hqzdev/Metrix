<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Metrix — Book a workspace from Telegram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:        #F2EFE8;
    --bg-2:      #ECE7DC;
    --bg-3:      #E3DDCF;
    --ink:       #14110D;
    --ink-2:     #5A5247;
    --ink-3:     #8C8170;
    --line:      #1411091a;
    --line-2:    #14110933;
    --card:      #FFFDF7;
    --accent:    #FF5B2E;
    --accent-2:  #FFE4D6;
    --accent-ink:#14110D;
    --tg:        #229ED9;
    --ok:        #2C8C5A;

    --r-sm: 8px;
    --r:    14px;
    --r-lg: 22px;
    --r-xl: 32px;

    --display: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --ui: "Geist", "Space Grotesk", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  *{ box-sizing: border-box; }
  html, body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--ui); -webkit-font-smoothing:antialiased; }
  body{ overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  button{ font:inherit; color:inherit; background:none; border:0; cursor:pointer; }
  input, select{ font:inherit; color:inherit; }
  ::selection{ background: var(--accent); color: var(--card); }

  /* ===== Type ===== */
  .display { font-family: var(--display); letter-spacing:-0.03em; line-height:0.92; font-weight:600; }
  .display-italic { font-style: italic; font-weight: 500; }
  .ui-mono-num { font-family: var(--display); font-feature-settings: "tnum","ss01"; font-variant-numeric: tabular-nums; }
  .eyebrow {
    font-family: var(--ui);
    text-transform: uppercase;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: var(--ink-2);
  }
  .lead { font-size: 19px; line-height: 1.5; color: var(--ink-2); max-width: 56ch; }
  .tag-dot::before{
    content:""; display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--accent); margin-right:8px; transform: translateY(-2px);
  }

  /* ===== Buttons ===== */
  .btn{
    display:inline-flex; align-items:center; gap:10px;
    padding: 14px 20px; border-radius: 999px;
    font-weight: 500; font-size: 15px;
    transition: transform .25s ease, background .2s, color .2s, border-color .2s;
    will-change: transform;
    border: 1px solid transparent;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn-primary{ background: var(--ink); color: var(--bg); }
  .btn-primary:hover{ background: var(--accent); color: var(--accent-ink); }
  .btn-accent{ background: var(--accent); color: var(--accent-ink); }
  .btn-accent:hover{ background: var(--ink); color: var(--bg); }
  .btn-ghost{ border-color: var(--line-2); color: var(--ink); }
  .btn-ghost:hover{ background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .btn .arrow{ transition: transform .3s ease; }
  .btn:hover .arrow{ transform: translateX(4px); }

  /* ===== Layout ===== */
  .wrap{ max-width: 1320px; margin: 0 auto; padding: 0 32px; }
  section{ padding: 96px 0; position:relative; }
  .section-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:32px; margin-bottom: 56px; }
  .section-title{ font-family: var(--display); font-size: clamp(40px, 5.6vw, 84px); line-height: 0.95; letter-spacing:-0.035em; font-weight:600; max-width: 14ch; }
  .section-title em{ font-style: italic; font-weight:500; color: var(--accent); }

  /* ===== Cards ===== */
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    transition: transform .35s cubic-bezier(.2,.7,.2,1), border-color .2s, box-shadow .3s;
  }
  .card:hover{
    transform: translateY(-2px);
    border-color: var(--line-2);
    box-shadow: 0 24px 60px -30px rgba(20,17,13,.25);
  }

  /* ===== Marquee ===== */
  .marquee{ overflow:hidden; position:relative; }
  .marquee-track{ display:flex; gap:48px; width:max-content; animation: marquee 38s linear infinite; }
  .marquee:hover .marquee-track{ animation-play-state: paused; }
  @keyframes marquee{
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ===== Pulse + fade entry ===== */
  @keyframes pulse-dot {
    0%,100%{ opacity:1; transform: scale(1); }
    50%    { opacity:.5; transform: scale(.85); }
  }
  .pulse-dot{ animation: pulse-dot 1.6s ease-in-out infinite; }

  @keyframes float-in {
    from { opacity:0; transform: translateY(10px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ===== Grid noise (subtle texture) ===== */
  .noise-bg{
    position: absolute; inset:0; pointer-events:none; opacity:.5; mix-blend-mode: multiply;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(20,17,13,.04), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(255,91,46,.06), transparent 50%);
  }

  /* ===== Divider with character ===== */
  .rule{
    height:1px; background: linear-gradient(90deg, transparent, var(--line-2) 12%, var(--line-2) 88%, transparent);
    border:0; margin:0;
  }

  /* ===== Focus reset on interactive elements ===== */
  body.no-italic-headlines .display-italic{ font-style: normal !important; }

  button:focus-visible, a:focus-visible, [role="button"]:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<div id="app"></div>

<!-- React / Babel -->

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>

</body>
